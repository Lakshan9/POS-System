<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Table Management</title>
    <link rel="stylesheet" href="style-tables.css" />
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="main-header">
    <div class="header-left">
        <h1>🪑 TABLE MANAGEMENT</h1>
        <span class="datetime" id="datetime">--</span>
    </div>
    <div class="header-right">
        <button onclick="window.location.href='index.html'" class="back-btn">🏠 Back to POS</button>
    </div>
</div>

<!-- ===== ACTIONS BAR ===== -->
<div class="actions-bar">
    <button class="active" id="showAllBtn">📋 All</button>
    <button id="showActiveBtn">🟡 Active</button>
    <button id="showEmptyBtn">🟢 Empty</button>
    <button id="showSummaryBtn">📊 Summary</button>
    <button id="refreshBtn">⟳ Refresh</button>
</div>

<!-- ===== TABLE GRID ===== -->
<div class="table-grid" id="tableGrid">
    <!-- Rendered by JS -->
</div>

<!-- ===== TABLE ORDER MODAL ===== -->
<div class="modal-overlay" id="tableModal">
    <div class="modal modal-wide">
        <div class="modal-header">
            <h2 id="modalTitle">🪑 Table #<span id="modalTableNum">1</span></h2>
            <button class="close-btn" id="closeModalBtn">✕</button>
        </div>
        <div class="modal-body">
            <div class="order-items" id="orderItems">
                <div class="empty-state">No items</div>
            </div>
            <div class="order-summary">
                <div class="line"><span>Subtotal</span><span id="modalSubtotal">Rs. 0.00</span></div>
                <div class="line total"><span>TOTAL</span><span id="modalTotal">Rs. 0.00</span></div>
                <div class="modal-actions">
                    <button class="pay-btn" id="payTableBtn">💳 Pay & Close</button>
                    <button class="close-btn-red" id="closeTableBtn">🚪 Close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== TABLE PAYMENT MODAL ===== -->
<div class="modal-overlay" id="tablePaymentModal">
    <div class="modal modal-small">
        <div class="modal-header">
            <h2>💳 Table Payment</h2>
            <button class="close-btn" id="closeTablePaymentBtn">✕</button>
        </div>
        <div class="payment-body">
            <div class="payment-details" id="tablePaymentDetails">
                <!-- Rendered by JS -->
            </div>
            <div class="payment-input">
                <label>Amount Received (Rs.)</label>
                <input type="number" id="tableAmountReceived" placeholder="0.00" step="0.01" min="0" />
            </div>
            <div class="payment-change" id="tablePaymentChange">
                <span>Change Due:</span>
                <span id="tableChangeAmount">Rs. 0.00</span>
            </div>
            <div class="print-option">
                <label>
                    <input type="checkbox" id="tablePrintBillCheckbox"/>
                    🖨️ Print Bill
                </label>
            </div>
            <div class="payment-actions">
                <button class="confirm-btn" id="confirmTablePaymentBtn" disabled>✅ Confirm Payment</button>
                <button class="cancel-btn" id="cancelTablePaymentBtn">✕ Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
//  DATA
// ============================================================
const TABLE_COUNT = 12;
const TABLE_ORDERS_KEY = 'hotel_table_orders';
const CUSTOMER_ORDERS_KEY = 'hotel_customer_orders';
const HISTORY_KEY = 'hotel_history';

let tableOrders = {};
let customerOrders = {};
let history = [];
let currentTable = null;
let currentCustomer = null;
let currentTableBill = null;
let currentFilter = 'all';

// ============================================================
//  LOAD / SAVE
// ============================================================
function loadData() {
    try {
        const storedTables = localStorage.getItem(TABLE_ORDERS_KEY);
        tableOrders = storedTables ? JSON.parse(storedTables) : {};
        for (let i = 1; i <= TABLE_COUNT; i++) {
            if (!tableOrders[i]) tableOrders[i] = [];
        }
        
        const storedCustomers = localStorage.getItem(CUSTOMER_ORDERS_KEY);
        customerOrders = storedCustomers ? JSON.parse(storedCustomers) : {};
        
        const storedHistory = localStorage.getItem(HISTORY_KEY);
        history = storedHistory ? JSON.parse(storedHistory) : [];
    } catch (e) {
        tableOrders = {};
        customerOrders = {};
        history = [];
        for (let i = 1; i <= TABLE_COUNT; i++) {
            tableOrders[i] = [];
        }
    }
}

function saveTables() { localStorage.setItem(TABLE_ORDERS_KEY, JSON.stringify(tableOrders)); }
function saveCustomers() { localStorage.setItem(CUSTOMER_ORDERS_KEY, JSON.stringify(customerOrders)); }
function saveHistory() { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

// ============================================================
//  FORCE INITIALIZE TABLES (if empty)
// ============================================================
function forceInitTables() {
    const stored = localStorage.getItem(TABLE_ORDERS_KEY);
    if (!stored || stored === '{}') {
        console.log('No table data found! Initializing...');
        const newOrders = {};
        for (let i = 1; i <= TABLE_COUNT; i++) {
            newOrders[i] = [];
        }
        localStorage.setItem(TABLE_ORDERS_KEY, JSON.stringify(newOrders));
        console.log('Tables initialized!');
    }
}

// ============================================================
//  DOM REFS
// ============================================================
const grid = document.getElementById('tableGrid');
const modal = document.getElementById('tableModal');
const tablePaymentModal = document.getElementById('tablePaymentModal');
const modalTableNum = document.getElementById('modalTableNum');
const modalTitle = document.getElementById('modalTitle');
const orderItems = document.getElementById('orderItems');
const modalSubtotal = document.getElementById('modalSubtotal');
const modalTotal = document.getElementById('modalTotal');
const tablePaymentDetails = document.getElementById('tablePaymentDetails');
const tableAmountReceived = document.getElementById('tableAmountReceived');
const tableChangeAmount = document.getElementById('tableChangeAmount');
const confirmTablePaymentBtn = document.getElementById('confirmTablePaymentBtn');
const cancelTablePaymentBtn = document.getElementById('cancelTablePaymentBtn');
const closeTablePaymentBtn = document.getElementById('closeTablePaymentBtn');
const tablePrintBillCheckbox = document.getElementById('tablePrintBillCheckbox');
const datetimeEl = document.getElementById('datetime');

// ============================================================
//  CLOCK
// ============================================================
function updateClock() {
    const now = new Date();
    const d = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
    const t = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    datetimeEl.textContent = `${d} ${t}`;
}
updateClock();
setInterval(updateClock, 1000);

// ============================================================
//  RENDER TABLES
// ============================================================
function renderTables(filter = 'all') {
    currentFilter = filter;
    let html = '';
    let totalItems = 0;
    let totalRevenue = 0;
    let activeTables = 0;
    
    for (let i = 1; i <= TABLE_COUNT; i++) {
        const items = tableOrders[i] || [];
        const count = items.length;
        const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0);
        
        let status = 'empty';
        let statusText = '🟢 Empty';
        let badge = '';
        
        if (count > 0) {
            status = 'occupied';
            statusText = '🟡 Active';
            badge = `<span class="badge">${count}</span>`;
            totalItems += count;
            totalRevenue += subtotal;
            activeTables++;
        }
        
        if (filter === 'active' && count === 0) continue;
        if (filter === 'empty' && count > 0) continue;
        if (filter === 'summary') continue;
        
        html += `
            <div class="table-btn ${status}" onclick="openTableModal(${i})">
                <span class="num">🪑 ${i}</span>
                <span class="status">${statusText}</span>
                ${badge}
                ${count > 0 ? `<span class="total">Rs. ${subtotal.toFixed(2)}</span>` : ''}
            </div>
        `;
    }
    
    if (filter === 'summary') {
        renderSummary();
        return;
    }
    
    html += `
        <div class="summary-bar">
            <span>📦 Total Items: ${totalItems}</span>
            <span>💰 Revenue: Rs. ${totalRevenue.toFixed(2)}</span>
            <span>🪑 Active Tables: ${activeTables}/${TABLE_COUNT}</span>
        </div>
    `;
    
    grid.innerHTML = html || '<div class="empty-state">No tables match this filter</div>';
}

// ============================================================
//  RENDER SUMMARY
// ============================================================
function renderSummary() {
    let html = '<div class="summary-grid">';
    let grandTotal = 0;
    let grandItems = 0;
    
    for (let i = 1; i <= TABLE_COUNT; i++) {
        const items = tableOrders[i] || [];
        const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0);
        const count = items.length;
        grandTotal += subtotal;
        grandItems += count;
        
        const status = count > 0 ? 'active' : 'empty';
        const statusText = count > 0 ? '🟡 Active' : '🟢 Empty';
        
        html += `
            <div class="summary-card ${status}">
                <span class="table-num">🪑 ${i}</span>
                <span class="table-status">${statusText}</span>
                <span class="table-total">Rs. ${subtotal.toFixed(2)}</span>
                <span class="table-count">${count} items</span>
            </div>
        `;
    }
    
    html += `
        <div class="summary-grand">
            <span>📊 GRAND TOTAL</span>
            <span>${grandItems} items</span>
            <span style="color:#16a34a; font-size:1.4rem;">Rs. ${grandTotal.toFixed(2)}</span>
        </div>
    </div>`;
    
    grid.innerHTML = html;
}

// ============================================================
//  OPEN TABLE MODAL
// ============================================================
function openTableModal(tableNum) {
    currentTable = tableNum;
    modalTableNum.textContent = tableNum;
    modalTitle.textContent = `🪑 Table #${tableNum}`;
    renderTableOrderItems(tableNum);
    modal.classList.add('open');
}

function renderTableOrderItems(tableNum) {
    const items = tableOrders[tableNum] || [];
    
    if (items.length === 0) {
        orderItems.innerHTML = '<div class="empty-state">No items for this table</div>';
        updateModalTotals(tableNum);
        return;
    }
    
    let html = '';
    items.forEach((item, index) => {
        const total = item.price * item.quantity;
        html += `
            <div class="order-item">
                <span>${item.name}</span>
                <div class="qty-control">
                    <button onclick="changeTableQty(${tableNum}, ${index}, -1)">−</button>
                    <span>${item.quantity}</span>
                    <button onclick="changeTableQty(${tableNum}, ${index}, 1)">+</button>
                </div>
                <span class="price">Rs. ${total.toFixed(2)}</span>
                <button class="remove" onclick="removeTableItem(${tableNum}, ${index})">✕</button>
            </div>
        `;
    });
    orderItems.innerHTML = html;
    updateModalTotals(tableNum);
}

function updateModalTotals(tableNum) {
    const items = tableOrders[tableNum] || [];
    const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const total = subtotal; // Tax අයින් කරන ලදි
    
    modalSubtotal.textContent = `Rs. ${subtotal.toFixed(2)}`;
    modalTotal.textContent = `Rs. ${total.toFixed(2)}`;
}

function changeTableQty(tableNum, index, delta) {
    const items = tableOrders[tableNum] || [];
    if (!items[index]) return;
    items[index].quantity += delta;
    if (items[index].quantity <= 0) {
        items.splice(index, 1);
    }
    saveTables();
    renderTableOrderItems(tableNum);
    renderTables(currentFilter);
}

function removeTableItem(tableNum, index) {
    const items = tableOrders[tableNum] || [];
    items.splice(index, 1);
    saveTables();
    renderTableOrderItems(tableNum);
    renderTables(currentFilter);
}

// ============================================================
//  CLOSE TABLE
// ============================================================
document.getElementById('closeTableBtn').addEventListener('click', function() {
    if (!currentTable) return;
    const items = tableOrders[currentTable] || [];
    if (items.length === 0) {
        alert('Table is already empty!');
        return;
    }
    if (confirm(`Close Table ${currentTable}?`)) {
        tableOrders[currentTable] = [];
        saveTables();
        renderTables(currentFilter);
        modal.classList.remove('open');
    }
});

// ============================================================
//  PRINT BILL FUNCTION (Tax අයින් කරපු)
// ============================================================
function printBill(bill) {
    const printWindow = window.open('', '_blank', 'width=400,height=600');
    
    const itemsHtml = bill.items.map(item => `
        <tr>
            <td>${item.name}</td>
            <td style="text-align:center;">${item.qty}</td>
            <td style="text-align:right;">Rs. ${item.price.toFixed(2)}</td>
            <td style="text-align:right;">Rs. ${(item.price * item.qty).toFixed(2)}</td>
        </tr>
    `).join('');
    
    printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>Bill #${bill.id}</title>
            <style>
                body { font-family: Arial, sans-serif; padding: 20px; max-width: 350px; margin: 0 auto; }
                .header { text-align: center; border-bottom: 2px dashed #333; padding-bottom: 10px; margin-bottom: 10px; }
                .header h1 { margin: 0; font-size: 1.2rem; }
                .header p { margin: 4px 0; color: #666; font-size: 0.8rem; }
                table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
                th { text-align: left; border-bottom: 1px solid #ddd; padding: 4px 0; }
                td { padding: 4px 0; border-bottom: 1px solid #eee; }
                .totals { margin-top: 10px; border-top: 2px solid #333; padding-top: 10px; }
                .totals div { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 2px 0; }
                .totals .grand { font-weight: 700; font-size: 1.1rem; border-top: 1px solid #ddd; padding-top: 6px; margin-top: 4px; }
                .totals .received { color: #16a34a; }
                .totals .change { color: #16a34a; }
                .footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #666; border-top: 2px dashed #333; padding-top: 10px; }
            </style>
        </head>
        <body>
            <div class="header">
                <h1>🍽️ HOTEL POS</h1>
                <p>${bill.date}</p>
                <p>Bill #${bill.id}</p>
                ${bill.table ? `<p>🪑 Table ${bill.table}</p>` : ''}
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Item</th>
                        <th style="text-align:center;">Qty</th>
                        <th style="text-align:right;">Price</th>
                        <th style="text-align:right;">Total</th>
                    </tr>
                </thead>
                <tbody>
                    ${itemsHtml}
                </tbody>
            </table>
            
            <div class="totals">
                <div><span>Subtotal</span><span>Rs. ${bill.subtotal.toFixed(2)}</span></div>
                <div class="grand"><span>TOTAL</span><span>Rs. ${bill.total.toFixed(2)}</span></div>
                <div class="received"><span>Received</span><span>Rs. ${bill.received.toFixed(2)}</span></div>
                <div class="change"><span>Change</span><span>Rs. ${bill.change.toFixed(2)}</span></div>
            </div>
            
            <div class="footer">
                <p>Thank you! Come again! 🍽️</p>
            </div>
            
            <script>
                window.onload = function() {
                    window.print();
                    setTimeout(function() {
                        window.close();
                    }, 500);
                };
            <\/script>
        </body>
        </html>
    `);
    
    printWindow.document.close();
}

// ============================================================
//  TABLE PAYMENT
// ============================================================
document.getElementById('payTableBtn').addEventListener('click', function() {
    if (!currentTable) return;
    const items = tableOrders[currentTable] || [];
    if (items.length === 0) {
        alert('No items to pay!');
        return;
    }
    
    const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const total = subtotal; // Tax අයින් කරන ලදි
    
    currentTableBill = {
        table: currentTable,
        items: items.map(c => ({ name: c.name, qty: c.quantity, price: c.price })),
        subtotal: subtotal,
        total: total
    };
    
    tablePaymentDetails.innerHTML = `
        <div style="margin-bottom:8px;font-weight:700;">🪑 Table ${currentTable}</div>
        ${items.map(item => `
            <div class="pay-line">
                <span>${item.name} x${item.quantity}</span>
                <span>Rs. ${(item.price * item.quantity).toFixed(2)}</span>
            </div>
        `).join('')}
        <div class="pay-line"><span>Subtotal</span><span>Rs. ${subtotal.toFixed(2)}</span></div>
        <div class="pay-line total"><span>TOTAL</span><span>Rs. ${total.toFixed(2)}</span></div>
    `;
    
    tableAmountReceived.value = '';
    tableChangeAmount.textContent = 'Rs. 0.00';
    const changeEl = document.getElementById('tablePaymentChange');
    changeEl.style.borderColor = '#86efac';
    changeEl.style.background = '#f0fdf4';
    changeEl.querySelector('span:first-child').textContent = 'Change Due:';
    confirmTablePaymentBtn.disabled = true;
    tablePrintBillCheckbox.checked = true;
    
    tablePaymentModal.classList.add('open');
    modal.classList.remove('open');
});

// ============================================================
//  CALCULATE CHANGE
// ============================================================
tableAmountReceived.addEventListener('input', function() {
    const received = parseFloat(this.value) || 0;
    const total = currentTableBill ? currentTableBill.total : 0;
    const change = received - total;
    
    const changeEl = document.getElementById('tablePaymentChange');
    const changeSpan = document.getElementById('tableChangeAmount');
    
    if (received > 0 && received < total) {
        changeSpan.textContent = `-Rs. ${(total - received).toFixed(2)}`;
        changeSpan.style.color = '#ef4444';
        changeEl.style.borderColor = '#fca5a5';
        changeEl.style.background = '#fef2f2';
        changeEl.querySelector('span:first-child').textContent = 'Remaining:';
        confirmTablePaymentBtn.disabled = true;
    } else if (received >= total) {
        changeSpan.textContent = `Rs. ${change.toFixed(2)}`;
        changeSpan.style.color = '#16a34a';
        changeEl.style.borderColor = '#86efac';
        changeEl.style.background = '#f0fdf4';
        changeEl.querySelector('span:first-child').textContent = 'Change Due:';
        confirmTablePaymentBtn.disabled = false;
    } else {
        changeSpan.textContent = 'Rs. 0.00';
        changeSpan.style.color = '#16a34a';
        changeEl.style.borderColor = '#86efac';
        changeEl.style.background = '#f0fdf4';
        changeEl.querySelector('span:first-child').textContent = 'Change Due:';
        confirmTablePaymentBtn.disabled = true;
    }
});

// ============================================================
//  CONFIRM TABLE PAYMENT
// ============================================================
confirmTablePaymentBtn.addEventListener('click', function() {
    console.log('Confirm button clicked!');
    
    if (!currentTableBill) {
        alert('No bill to process!');
        return;
    }
    
    const received = parseFloat(tableAmountReceived.value) || 0;
    
    if (received < currentTableBill.total) {
        alert(`❌ Insufficient amount!\nTotal: Rs. ${currentTableBill.total.toFixed(2)}\nReceived: Rs. ${received.toFixed(2)}\nRemaining: Rs. ${(currentTableBill.total - received).toFixed(2)}`);
        return;
    }
    
    const bill = {
        id: Date.now(),
        date: new Date().toLocaleString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }),
        table: currentTableBill.table,
        items: currentTableBill.items,
        subtotal: currentTableBill.subtotal,
        total: currentTableBill.total,
        received: received,
        change: received - currentTableBill.total
    };
    
    history.push(bill);
    saveHistory();
    
    // Clear table
    tableOrders[currentTableBill.table] = [];
    saveTables();
    renderTables(currentFilter);
    
    // Ask for print
    const shouldPrint = tablePrintBillCheckbox ? tablePrintBillCheckbox.checked : true;
    
    tablePaymentModal.classList.remove('open');
    
    if (shouldPrint) {
        printBill(bill);
    }
    
    alert(`✅ Payment Successful!\nTable ${bill.table}\nTotal: Rs. ${bill.total.toFixed(2)}\nReceived: Rs. ${bill.received.toFixed(2)}\nChange: Rs. ${bill.change.toFixed(2)}\nThank you! 🍽️`);
    
    currentTableBill = null;
    currentTable = null;
});

// ============================================================
//  CANCEL TABLE PAYMENT
// ============================================================
cancelTablePaymentBtn.addEventListener('click', function() {
    tablePaymentModal.classList.remove('open');
    currentTableBill = null;
    if (currentTable) {
        openTableModal(currentTable);
    }
});

closeTablePaymentBtn.addEventListener('click', function() {
    tablePaymentModal.classList.remove('open');
    currentTableBill = null;
    if (currentTable) {
        openTableModal(currentTable);
    }
});

tablePaymentModal.addEventListener('click', function(e) {
    if (e.target === tablePaymentModal) {
        tablePaymentModal.classList.remove('open');
        currentTableBill = null;
        if (currentTable) {
            openTableModal(currentTable);
        }
    }
});

// ============================================================
//  CLOSE MODALS
// ============================================================
document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });

// ============================================================
//  FILTER BUTTONS
// ============================================================
document.getElementById('showAllBtn').addEventListener('click', function() {
    document.querySelectorAll('.actions-bar button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderTables('all');
});

document.getElementById('showActiveBtn').addEventListener('click', function() {
    document.querySelectorAll('.actions-bar button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderTables('active');
});

document.getElementById('showEmptyBtn').addEventListener('click', function() {
    document.querySelectorAll('.actions-bar button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderTables('empty');
});

document.getElementById('showSummaryBtn').addEventListener('click', function() {
    document.querySelectorAll('.actions-bar button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderTables('summary');
});

document.getElementById('refreshBtn').addEventListener('click', function() {
    loadData();
    renderTables(currentFilter);
});

// ============================================================
//  EXPORT FUNCTIONS
// ============================================================
window.changeTableQty = changeTableQty;
window.removeTableItem = removeTableItem;
window.openTableModal = openTableModal;

// ============================================================
//  INIT
// ============================================================
forceInitTables();
loadData();
renderTables('all');
</script>

</body>
</html>
