<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Menu Management - Hotel POS</title>
    <link rel="stylesheet" href="style-items.css" />
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="main-header">
    <div class="header-left">
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleDropdown()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <h1>📋 MENU MANAGEMENT</h1>
        <span class="datetime" id="datetime">--</span>
    </div>
    <div class="header-right">
        <button onclick="window.location.href='index.html'" class="back-btn">🏠 Back to POS</button>
    </div>
</div>

<!-- ===== DROPDOWN MENU ===== -->
<div class="dropdown-menu" id="dropdownMenu">
    <div class="dropdown-content">
        <a href="index.html" class="dropdown-item">
            <span class="drop-icon">🧾</span>
            <span class="drop-text">POS</span>
        </a>
        <a href="index.html#history" class="dropdown-item" onclick="switchTab('history')">
            <span class="drop-icon">📜</span>
            <span class="drop-text">History</span>
        </a>
        <a href="report.html" class="dropdown-item">
            <span class="drop-icon">📊</span>
            <span class="drop-text">Report</span>
        </a>
        <a href="items.html" class="dropdown-item active-link">
            <span class="drop-icon">📋</span>
            <span class="drop-text">Menu</span>
        </a>
        <a href="tables.html" class="dropdown-item">
            <span class="drop-icon">🪑</span>
            <span class="drop-text">Tables</span>
        </a>
        <a href="stock.html" class="dropdown-item">
            <span class="drop-icon">📦</span>
            <span class="drop-text">Stock</span>
        </a>
        <a href="settings.html" class="dropdown-item">
            <span class="drop-icon">⚙️</span>
            <span class="drop-text">Settings</span>
        </a>
        <div class="dropdown-divider"></div>
        <a href="#" class="dropdown-item" onclick="toggleFullScreen();">
            <span class="drop-icon">⛶</span>
            <span class="drop-text">Full Screen</span>
        </a>
        <a href="#" class="dropdown-item" onclick="logout();">
            <span class="drop-icon">🚪</span>
            <span class="drop-text">Logout</span>
        </a>
    </div>
</div>

<!-- ===== DROPDOWN OVERLAY ===== -->
<div class="dropdown-overlay" id="dropdownOverlay" onclick="closeDropdown()"></div>

<!-- ===== ACTIONS BAR ===== -->
<div class="actions-bar">
    <button class="active" id="showCategoriesBtn">📂 Categories</button>
    <button id="showAllItemsBtn">📦 All Items</button>
    <button id="refreshBtn">⟳ Refresh</button>
    <button class="stock-btn" onclick="window.location.href='stock.html'">📦 Stock</button>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content" id="mainContent">
    <!-- Rendered by JS -->
</div>

<!-- ===== ADD CATEGORY MODAL ===== -->
<div class="modal-overlay" id="addCategoryModal">
    <div class="modal modal-small">
        <div class="modal-header">
            <h2 id="categoryModalTitle">📁 Add New Category</h2>
            <button class="close-btn" id="closeCategoryModalBtn">✕</button>
        </div>
        <div class="modal-body">
            <label>Category Name</label>
            <input type="text" id="newCategoryName" placeholder="e.g. Seafood" />
            <div class="modal-actions">
                <button class="save-btn" id="saveCategoryBtn">💾 Save</button>
                <button class="cancel-btn" id="cancelCategoryBtn">✕ Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== ADD ITEM MODAL ===== -->
<div class="modal-overlay" id="addItemModal">
    <div class="modal modal-small">
        <div class="modal-header">
            <h2 id="itemModalTitle">➕ Add New Item</h2>
            <button class="close-btn" id="closeItemModalBtn">✕</button>
        </div>
        <div class="modal-body">
            <label>Item Name</label>
            <input type="text" id="newItemName" placeholder="e.g. Grilled Fish" />
            <label>Price (Rs.)</label>
            <input type="number" id="newItemPrice" placeholder="0.00" step="0.01" min="0" />
            <label>Category</label>
            <select id="newItemCategory">
                <!-- Rendered by JS -->
            </select>
            <input type="hidden" id="editItemId" value="" />
            <div class="modal-actions">
                <button class="save-btn" id="saveItemBtn">💾 Save</button>
                <button class="delete-btn" id="deleteItemBtn" style="display:none;">🗑 Delete</button>
                <button class="cancel-btn" id="cancelItemBtn">✕ Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== CONFIRM DELETE MODAL ===== -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal modal-small">
        <div class="modal-header">
            <h2>⚠️ Confirm Delete</h2>
            <button class="close-btn" id="closeConfirmModalBtn">✕</button>
        </div>
        <div class="modal-body">
            <p id="confirmMessage" style="margin-bottom:16px;color:#475569;">Are you sure you want to delete this?</p>
            <div class="modal-actions">
                <button class="delete-btn" id="confirmDeleteBtn">🗑 Delete</button>
                <button class="cancel-btn" id="cancelConfirmBtn">✕ Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
//  DATA
// ============================================================
const STORAGE_KEY = 'hotel_items';
const CATEGORY_KEY = 'hotel_categories';

let items = [];
let categories = [];
let currentView = 'categories';
let editingCategory = null;
let pendingDelete = null;
let pendingDeleteType = null;

// ============================================================
//  LOAD / SAVE
// ============================================================
function loadData() {
    try {
        const storedCategories = localStorage.getItem(CATEGORY_KEY);
        categories = storedCategories ? JSON.parse(storedCategories) : ['main', 'drinks', 'desserts'];
        
        const storedItems = localStorage.getItem(STORAGE_KEY);
        if (storedItems) {
            items = JSON.parse(storedItems);
        } else {
            items = [
                { id: 1, name: '🍔 Burger', price: 8.99, category: 'main' },
                { id: 2, name: '🍕 Pizza', price: 10.99, category: 'main' },
                { id: 3, name: '🍝 Pasta', price: 9.99, category: 'main' },
                { id: 4, name: '🥗 Salad', price: 6.99, category: 'main' },
                { id: 5, name: '🍜 Noodles', price: 7.99, category: 'main' },
                { id: 6, name: '🍗 Chicken', price: 11.99, category: 'main' },
                { id: 7, name: '🥩 Steak', price: 15.99, category: 'main' },
                { id: 8, name: '🍣 Sushi', price: 12.99, category: 'main' },
                { id: 9, name: '🥤 Soda', price: 2.99, category: 'drinks' },
                { id: 10, name: '🧃 Juice', price: 3.49, category: 'drinks' },
                { id: 11, name: '☕ Coffee', price: 2.99, category: 'drinks' },
                { id: 12, name: '🍰 Cake', price: 4.99, category: 'desserts' },
                { id: 13, name: '🍦 Ice Cream', price: 3.99, category: 'desserts' },
                { id: 14, name: '🍪 Cookies', price: 2.49, category: 'desserts' },
            ];
            saveItems();
        }
        
        // Ensure all categories exist in items
        items.forEach(item => {
            if (!categories.includes(item.category)) {
                categories.push(item.category);
                saveCategories();
            }
        });
        
    } catch (e) {
        console.error('Load error:', e);
        items = [];
        categories = ['main', 'drinks', 'desserts'];
    }
}

function saveItems() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
function saveCategories() { localStorage.setItem(CATEGORY_KEY, JSON.stringify(categories)); }

// ============================================================
//  DOM REFS
// ============================================================
const mainContent = document.getElementById('mainContent');
const datetimeEl = document.getElementById('datetime');
const addCategoryModal = document.getElementById('addCategoryModal');
const addItemModal = document.getElementById('addItemModal');
const confirmModal = document.getElementById('confirmModal');
const newCategoryName = document.getElementById('newCategoryName');
const newItemName = document.getElementById('newItemName');
const newItemPrice = document.getElementById('newItemPrice');
const newItemCategory = document.getElementById('newItemCategory');
const editItemId = document.getElementById('editItemId');
const itemModalTitle = document.getElementById('itemModalTitle');
const categoryModalTitle = document.getElementById('categoryModalTitle');
const deleteItemBtn = document.getElementById('deleteItemBtn');
const confirmMessage = document.getElementById('confirmMessage');

// ============================================================
//  CLOCK
// ============================================================
function updateClock() {
    const now = new Date();
    const d = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
    const t = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    datetimeEl.textContent = `${d} ${t}`;
}
updateClock();
setInterval(updateClock, 1000);

// ============================================================
//  DROPDOWN MENU
// ============================================================
function toggleDropdown() {
    const btn = document.getElementById('hamburgerBtn');
    const menu = document.getElementById('dropdownMenu');
    const overlay = document.getElementById('dropdownOverlay');
    
    btn.classList.toggle('open');
    menu.classList.toggle('open');
    overlay.classList.toggle('active');
    document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
}

function closeDropdown() {
    document.getElementById('hamburgerBtn').classList.remove('open');
    document.getElementById('dropdownMenu').classList.remove('open');
    document.getElementById('dropdownOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

// ============================================================
//  RENDER CATEGORIES
// ============================================================
function renderCategories() {
    currentView = 'categories';
    document.getElementById('showCategoriesBtn').classList.add('active');
    document.getElementById('showAllItemsBtn').classList.remove('active');
    
    let html = `
        <div class="view-header">
            <h2>📂 Categories <span class="count-badge">${categories.length}</span></h2>
            <button class="add-btn" id="addCategoryBtn">➕ Add Category</button>
        </div>
        <div class="category-grid">
    `;
    
    if (categories.length === 0) {
        html += `
            <div class="empty-state" style="grid-column:1/-1;">
                <span style="font-size:3rem;">📂</span>
                <p>No categories found</p>
                <p style="font-size:0.85rem;color:#94a3b8;">Click "Add Category" to create one</p>
            </div>
        `;
    } else {
        categories.forEach(cat => {
            const count = items.filter(i => i.category === cat).length;
            const icon = getCategoryIcon(cat);
            const displayName = getCategoryDisplayName(cat);
            
            html += `
                <div class="category-card" onclick="showCategoryItems('${cat}')">
                    <div class="cat-icon">${icon}</div>
                    <div class="cat-info">
                        <div class="cat-name">${displayName}</div>
                        <div class="cat-count">${count} item${count !== 1 ? 's' : ''}</div>
                    </div>
                    <div class="cat-actions">
                        <button class="cat-edit" onclick="event.stopPropagation();editCategory('${cat}')" title="Edit Category">✎</button>
                        <button class="cat-delete" onclick="event.stopPropagation();confirmDeleteCategory('${cat}')" title="Delete Category">✕</button>
                    </div>
                </div>
            `;
        });
    }
    
    html += '</div>';
    mainContent.innerHTML = html;
    
    const addBtn = document.getElementById('addCategoryBtn');
    if (addBtn) addBtn.addEventListener('click', openAddCategoryModal);
}

// ============================================================
//  SHOW CATEGORY ITEMS
// ============================================================
function showCategoryItems(category) {
    currentView = 'category-items';
    const catItems = items.filter(i => i.category === category);
    const displayName = getCategoryDisplayName(category);
    const icon = getCategoryIcon(category);
    
    let html = `
        <div class="view-header">
            <button class="back-btn-small" onclick="renderCategories()">⬅ Back</button>
            <h2>${icon} ${displayName} <span class="count-badge">${catItems.length}</span></h2>
            <button class="add-btn" onclick="openAddItemModal('${category}')">➕ Add Item</button>
        </div>
        <div class="item-grid">
    `;
    
    if (catItems.length === 0) {
        html += `
            <div class="empty-state">
                <span style="font-size:3rem;">🍽️</span>
                <p>No items in this category</p>
                <p style="font-size:0.85rem;color:#94a3b8;">Click "Add Item" to add one</p>
            </div>
        `;
    } else {
        catItems.forEach(item => {
            html += `
                <div class="item-card">
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">Rs. ${item.price.toFixed(2)}</span>
                    <div class="item-actions">
                        <button class="item-edit" onclick="editItem(${item.id})" title="Edit Item">✎</button>
                        <button class="item-delete" onclick="confirmDeleteItem(${item.id})" title="Delete Item">✕</button>
                    </div>
                </div>
            `;
        });
    }
    
    html += '</div>';
    mainContent.innerHTML = html;
}

// ============================================================
//  RENDER ALL ITEMS
// ============================================================
function renderAllItems() {
    currentView = 'all-items';
    document.getElementById('showAllItemsBtn').classList.add('active');
    document.getElementById('showCategoriesBtn').classList.remove('active');
    
    const sortedItems = [...items].sort((a, b) => a.category.localeCompare(b.category));
    
    let html = `
        <div class="view-header">
            <h2>📦 All Items <span class="count-badge">${items.length}</span></h2>
            <button class="add-btn" onclick="openAddItemModal()">➕ Add Item</button>
        </div>
        <div class="item-grid all-items">
    `;
    
    if (items.length === 0) {
        html += `
            <div class="empty-state" style="grid-column:1/-1;">
                <span style="font-size:3rem;">📦</span>
                <p>No items found</p>
                <p style="font-size:0.85rem;color:#94a3b8;">Click "Add Item" to add one</p>
            </div>
        `;
    } else {
        sortedItems.forEach(item => {
            html += `
                <div class="item-card">
                    <span class="item-category">${getCategoryDisplayName(item.category)}</span>
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">Rs. ${item.price.toFixed(2)}</span>
                    <div class="item-actions">
                        <button class="item-edit" onclick="editItem(${item.id})" title="Edit Item">✎</button>
                        <button class="item-delete" onclick="confirmDeleteItem(${item.id})" title="Delete Item">✕</button>
                    </div>
                </div>
            `;
        });
    }
    
    html += '</div>';
    mainContent.innerHTML = html;
}

// ============================================================
//  CATEGORY MANAGEMENT
// ============================================================
function openAddCategoryModal() {
    newCategoryName.value = '';
    editingCategory = null;
    categoryModalTitle.textContent = '📁 Add New Category';
    addCategoryModal.classList.add('open');
    setTimeout(() => newCategoryName.focus(), 100);
}

function editCategory(category) {
    editingCategory = category;
    newCategoryName.value = category;
    categoryModalTitle.textContent = '✎ Edit Category';
    addCategoryModal.classList.add('open');
    setTimeout(() => newCategoryName.focus(), 100);
}

document.getElementById('saveCategoryBtn').addEventListener('click', function() {
    const name = newCategoryName.value.trim();
    if (!name) {
        alert('⚠️ Please enter a category name!');
        return;
    }
    
    if (editingCategory) {
        // Edit existing category
        const oldName = editingCategory;
        const index = categories.indexOf(oldName);
        if (index !== -1) {
            categories[index] = name;
            // Update items with old category name
            items.forEach(item => {
                if (item.category === oldName) {
                    item.category = name;
                }
            });
            saveCategories();
            saveItems();
        }
        editingCategory = null;
        showToast('✅ Category updated successfully!');
    } else {
        // Add new category
        if (categories.includes(name)) {
            alert('⚠️ Category already exists!');
            return;
        }
        categories.push(name);
        saveCategories();
        showToast(`✅ Category "${name}" added successfully!`);
    }
    
    addCategoryModal.classList.remove('open');
    renderCategories();
});

document.getElementById('cancelCategoryBtn').addEventListener('click', function() {
    addCategoryModal.classList.remove('open');
    editingCategory = null;
});

document.getElementById('closeCategoryModalBtn').addEventListener('click', function() {
    addCategoryModal.classList.remove('open');
    editingCategory = null;
});

function confirmDeleteCategory(category) {
    const displayName = getCategoryDisplayName(category);
    const count = items.filter(i => i.category === category).length;
    confirmMessage.innerHTML = `
        <strong>Delete category "${displayName}"?</strong><br/>
        This will also delete all <strong>${count}</strong> item${count !== 1 ? 's' : ''} in this category.
        <br/><br/>This action cannot be undone!
    `;
    pendingDelete = category;
    pendingDeleteType = 'category';
    confirmModal.classList.add('open');
}

function confirmDeleteItem(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    confirmMessage.innerHTML = `
        <strong>Delete "${item.name}"?</strong><br/>
        This action cannot be undone!
    `;
    pendingDelete = id;
    pendingDeleteType = 'item';
    confirmModal.classList.add('open');
}

function executeDelete() {
    if (pendingDeleteType === 'category') {
        const category = pendingDelete;
        items = items.filter(i => i.category !== category);
        categories = categories.filter(c => c !== category);
        saveItems();
        saveCategories();
        showToast(`✅ Category deleted!`);
    } else if (pendingDeleteType === 'item') {
        const id = pendingDelete;
        items = items.filter(i => i.id !== id);
        saveItems();
        showToast(`✅ Item deleted!`);
    }
    
    pendingDelete = null;
    pendingDeleteType = null;
    confirmModal.classList.remove('open');
    
    if (currentView === 'all-items') {
        renderAllItems();
    } else {
        renderCategories();
    }
}

document.getElementById('confirmDeleteBtn').addEventListener('click', executeDelete);
document.getElementById('cancelConfirmBtn').addEventListener('click', function() {
    confirmModal.classList.remove('open');
    pendingDelete = null;
    pendingDeleteType = null;
});
document.getElementById('closeConfirmModalBtn').addEventListener('click', function() {
    confirmModal.classList.remove('open');
    pendingDelete = null;
    pendingDeleteType = null;
});

// ============================================================
//  ITEM MANAGEMENT
// ============================================================
function openAddItemModal(category = null) {
    itemModalTitle.textContent = '➕ Add New Item';
    newItemName.value = '';
    newItemPrice.value = '';
    editItemId.value = '';
    deleteItemBtn.style.display = 'none';
    
    // Populate category dropdown
    newItemCategory.innerHTML = categories.map(cat => 
        `<option value="${cat}" ${cat === category ? 'selected' : ''}>${getCategoryDisplayName(cat)}</option>`
    ).join('');
    
    addItemModal.classList.add('open');
    setTimeout(() => newItemName.focus(), 100);
}

function editItem(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    
    itemModalTitle.textContent = '✎ Edit Item';
    newItemName.value = item.name;
    newItemPrice.value = item.price;
    editItemId.value = id;
    deleteItemBtn.style.display = 'block';
    
    newItemCategory.innerHTML = categories.map(cat => 
        `<option value="${cat}" ${cat === item.category ? 'selected' : ''}>${getCategoryDisplayName(cat)}</option>`
    ).join('');
    
    addItemModal.classList.add('open');
    setTimeout(() => newItemName.focus(), 100);
}

document.getElementById('saveItemBtn').addEventListener('click', function() {
    const name = newItemName.value.trim();
    const price = parseFloat(newItemPrice.value);
    const category = newItemCategory.value;
    const editId = editItemId.value;
    
    if (!name) {
        alert('⚠️ Please enter an item name!');
        return;
    }
    if (isNaN(price) || price < 0) {
        alert('⚠️ Please enter a valid price!');
        return;
    }
    
    if (editId) {
        // Edit existing item
        const idx = items.findIndex(i => i.id === parseInt(editId));
        if (idx !== -1) {
            // Check duplicate name in same category
            const duplicate = items.find(i => i.name.toLowerCase() === name.toLowerCase() && 
                                             i.category === category && 
                                             i.id !== parseInt(editId));
            if (duplicate) {
                alert('⚠️ Item with this name already exists in this category!');
                return;
            }
            items[idx].name = name;
            items[idx].price = price;
            items[idx].category = category;
            saveItems();
            showToast(`✅ Item "${name}" updated!`);
        }
    } else {
        // Add new item
        const duplicate = items.find(i => i.name.toLowerCase() === name.toLowerCase() && 
                                         i.category === category);
        if (duplicate) {
            alert('⚠️ Item already exists in this category!');
            return;
        }
        const maxId = items.reduce((max, i) => Math.max(max, i.id), 0);
        items.push({ id: maxId + 1, name, price, category });
        saveItems();
        showToast(`✅ Item "${name}" added!`);
    }
    
    addItemModal.classList.remove('open');
    
    if (currentView === 'all-items') {
        renderAllItems();
    } else {
        renderCategories();
    }
});

document.getElementById('deleteItemBtn').addEventListener('click', function() {
    const id = parseInt(editItemId.value);
    if (!id) return;
    addItemModal.classList.remove('open');
    confirmDeleteItem(id);
});

document.getElementById('cancelItemBtn').addEventListener('click', function() {
    addItemModal.classList.remove('open');
});

document.getElementById('closeItemModalBtn').addEventListener('click', function() {
    addItemModal.classList.remove('open');
});

// ============================================================
//  CATEGORY HELPERS
// ============================================================
function getCategoryIcon(category) {
    const icons = {
        'main': '🍽️',
        'drinks': '🥤',
        'desserts': '🍰',
        'seafood': '🐟',
        'appetizers': '🍢',
        'soups': '🍲',
        'specials': '⭐'
    };
    return icons[category] || '📁';
}

function getCategoryDisplayName(category) {
    const names = {
        'main': 'Main Dishes',
        'drinks': 'Beverages',
        'desserts': 'Desserts',
        'seafood': 'Seafood',
        'appetizers': 'Appetizers',
        'soups': 'Soups',
        'specials': 'Specials'
    };
    return names[category] || category.charAt(0).toUpperCase() + category.slice(1);
}

// ============================================================
//  FILTER BUTTONS
// ============================================================
document.getElementById('showCategoriesBtn').addEventListener('click', renderCategories);
document.getElementById('showAllItemsBtn').addEventListener('click', renderAllItems);
document.getElementById('refreshBtn').addEventListener('click', function() {
    loadData();
    if (currentView === 'all-items') {
        renderAllItems();
    } else {
        renderCategories();
    }
    showToast('🔄 Refreshed!');
});

// ============================================================
//  MODAL CLOSE (click outside)
// ============================================================
addCategoryModal.addEventListener('click', (e) => {
    if (e.target === addCategoryModal) {
        addCategoryModal.classList.remove('open');
        editingCategory = null;
    }
});

addItemModal.addEventListener('click', (e) => {
    if (e.target === addItemModal) {
        addItemModal.classList.remove('open');
    }
});

confirmModal.addEventListener('click', (e) => {
    if (e.target === confirmModal) {
        confirmModal.classList.remove('open');
        pendingDelete = null;
        pendingDeleteType = null;
    }
});

// ============================================================
//  TOAST NOTIFICATION
// ============================================================
function showToast(message) {
    let toast = document.getElementById('toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = `
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            z-index: 9999;
            opacity: 0;
            transition: all 0.5s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 90%;
            text-align: center;
            pointer-events: none;
        `;
        document.body.appendChild(toast);
    }
    
    toast.textContent = message;
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) translateY(0)';
    
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(100px)';
    }, 3000);
}

// ============================================================
//  FULL SCREEN
// ============================================================
function toggleFullScreen() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        const el = document.documentElement;
        if (el.requestFullscreen) {
            el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
        }
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        }
    }
}

// ============================================================
//  LOGOUT
// ============================================================
function logout() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('hotel_logged_in');
        localStorage.removeItem('hotel_username');
        window.location.href = 'login.html';
    }
}

// ============================================================
//  CHECK LOGIN STATUS
// ============================================================
function checkLoginStatus() {
    const isLoggedIn = localStorage.getItem('hotel_logged_in');
    if (isLoggedIn !== 'true') {
        window.location.href = 'login.html';
    }
}

// ============================================================
//  EXPORT FUNCTIONS
// ============================================================
window.renderCategories = renderCategories;
window.renderAllItems = renderAllItems;
window.showCategoryItems = showCategoryItems;
window.openAddItemModal = openAddItemModal;
window.editItem = editItem;
window.confirmDeleteItem = confirmDeleteItem;
window.confirmDeleteCategory = confirmDeleteCategory;
window.editCategory = editCategory;
window.openAddCategoryModal = openAddCategoryModal;
window.toggleDropdown = toggleDropdown;
window.closeDropdown = closeDropdown;
window.toggleFullScreen = toggleFullScreen;
window.logout = logout;
window.showToast = showToast;

// ============================================================
//  KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        addCategoryModal.classList.remove('open');
        addItemModal.classList.remove('open');
        confirmModal.classList.remove('open');
        closeDropdown();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
        e.preventDefault();
        loadData();
        if (currentView === 'all-items') {
            renderAllItems();
        } else {
            renderCategories();
        }
        showToast('🔄 Refreshed!');
    }
});

// ============================================================
//  INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    checkLoginStatus();
    loadData();
    renderCategories();
});
</script>
